name: Kora Live - Auto-Pilot Score Fetcher V21.0

on:
  schedule:
    - cron: "*/5 * * * *" # Every 5 minutes
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all dates (true/false)'
        required: false
        default: 'false'

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # ✅ AUTO-PILOT: Never mark workflow as failed
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install axios firebase-admin dotenv
        continue-on-error: true

      - name: Fetch and Save Scores (Auto-Pilot)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || '33e62ca975a749858503fdf63b75d9d7' }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: node fetch-scores.js || echo "⚠️ fetch-scores finished with warnings (non-fatal)"
        continue-on-error: true

      - name: Sync Standings (Auto-Pilot)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || '33e62ca975a749858503fdf63b75d9d7' }}
        run: node sync_script.js || echo "⚠️ sync_script finished with warnings (non-fatal)"
        continue-on-error: true
