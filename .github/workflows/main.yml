name: Kora Live - Smart Score Fetcher

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all dates (true/false)'
        required: false
        default: 'false'

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install axios firebase-admin dotenv

      - name: Fetch and Save Scores
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          RAPID_API_KEY_1: ${{ secrets.RAPID_API_KEY_1 }}
          RAPID_API_KEY_2: ${{ secrets.RAPID_API_KEY_2 }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: node fetch-scores.js

      - name: Sync Standings and News
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node sync_script.js || echo "sync_script finished with warnings"
