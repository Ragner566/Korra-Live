name: Kora Live - Auto-Pilot Score Fetcher V20.6

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all dates (true/false)'
        required: false
        default: 'false'

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # ✅ AUTO-PILOT: Never mark workflow as failed
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install axios firebase-admin dotenv
        continue-on-error: true

      - name: Fetch and Save Scores (Auto-Pilot)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || '9668d27376c9462d9214777a8340d21e' }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: node fetch-scores.js || echo "⚠️ fetch-scores finished with warnings (non-fatal)"
        continue-on-error: true

      - name: Sync Standings (Auto-Pilot)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN || '9668d27376c9462d9214777a8340d21e' }}
        run: node sync_script.js || echo "⚠️ sync_script finished with warnings (non-fatal)"
        continue-on-error: true
