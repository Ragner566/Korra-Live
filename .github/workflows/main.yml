name: Kora Live - Smart Score Fetcher

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes — smart cache inside will skip if not needed
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  fetch-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install axios firebase-admin dotenv

      - name: Fetch and Save Scores
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          RAPID_API_KEY_1: ${{ secrets.RAPID_API_KEY_1 }}
          RAPID_API_KEY_2: ${{ secrets.RAPID_API_KEY_2 }}
        run: node fetch-scores.js
