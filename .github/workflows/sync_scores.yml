name: Football Data Sync

on:
  schedule:
    # Run every 15 minutes
    - cron: "*/2 * * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  sync_scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: |
          npm install axios firebase-admin

      - name: Run Sync Script
        env:
          # These secrets must be set in GitHub Repository Settings -> Secrets and variables -> Actions
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node sync_script.js
